id: refund-rag-cost-regression
name: refund-rag-cost-regression
description: Same conversation as 01; tighter budgets to catch cost regressions.

agent:
  type: http
  endpoint: http://127.0.0.1:8080/chat
  timeout_s: 10

conversation:
  - user: "I want to return my order."
  - user: "My order number is 12345."

expect:
  must_call_tools: [get_order, create_return_label]
  final_response_contains: [return label]

budgets:
  max_cost_usd: 0.05
  max_total_latency_ms: 8000
  max_tool_calls: 6
  max_llm_calls: 4
  # Regression budgets — only enforced when --baseline is provided.
  max_cost_regression_pct: 20
  max_input_token_regression_pct: 30
  max_latency_regression_pct: 30
