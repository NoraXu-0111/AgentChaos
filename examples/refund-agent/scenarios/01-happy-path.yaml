id: refund-happy-path
name: refund-happy-path
description: Confirm the refund agent calls get_order and emits a return label.

agent:
  type: http
  endpoint: http://localhost:8080/chat
  timeout_s: 10

conversation:
  - user: "I want to return my order."
  - user: "My order number is 12345."

expect:
  must_call_tools: [get_order, create_return_label]
  must_not_call_tools: [delete_customer]
  final_response_contains: [return label]

budgets:
  max_cost_usd: 0.05
  max_total_latency_ms: 8000
  max_tool_calls: 6
  max_llm_calls: 4
