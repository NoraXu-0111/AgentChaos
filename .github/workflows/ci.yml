name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Create venv
        run: uv venv -p ${{ matrix.python }} .venv
      - name: Install
        run: |
          source .venv/bin/activate
          uv pip install -e ".[dev]"
      - name: Lint
        run: |
          source .venv/bin/activate
          ruff check .
      - name: Type check
        run: |
          source .venv/bin/activate
          mypy agentchaos
      - name: Test
        run: |
          source .venv/bin/activate
          pytest -q --cov=agentchaos --cov-report=term
