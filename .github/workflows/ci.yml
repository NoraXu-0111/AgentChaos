name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}
      - name: Create venv
        run: uv venv -p ${{ matrix.python }} .venv
      - name: Install
        run: uv pip install -e ".[dev]"
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy agentchaos
      - name: Test
        run: uv run pytest -q --cov=agentchaos --cov-report=term
